<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css">
    <title> الموافقات المسبقة </title>
    <link rel="shortcut icon" href="images/UHIA.jpg" type="image/png">
</head>

<body>
    <div class="d-flex justify-content-between rounded shadow-lg mx-lg-5 ">


        <div class="logoContainer">
            <img src="images/UHIAlogo.png" class="rounded d-lg-flex d-none px-5" alt="UHIA logo">
        </div>
        <div class="mx-auto my-auto  pt-5 ">
            <h1 class="mx-auto pb-2">تسجيل الدخول </h1>
            <form action="" method="post">
                <div>
                    <label for="username" > أسم المستخدم</label>
                    <input type="text" class="form-control mb-3 w-100" name="username" required id="username">
                </div>
                <div>
                    <label for="pwd" > كلمة المرور </label>
                    <input type="password" class="form-control mb-3" id="pwd" name="password" minlength="10" required>
                    <button type="submit"  class="d-block mx-auto btn btn-primary"
                     onclick="window.location.href='htmls/form.html?v=1';"> تسجيل الدخول  </button>
            </form>

        </div>

    </div>
</body>

</html>
